<text x="226" y="56" font-family="monospace" font-size="13" fill="#ffffff">15.6C</text>
<text x="26" y="112" font-family="monospace" font-size="32" fill="#ffffff" font-weight="bold">2.6</text>
<text x="80" y="92" font-family="monospace" font-size="10" fill="#888888">m/s</text>
